openapi: 3.0.3
info:
  version: 3.0.0-beta
  title: Wykop API v3 (beta)
  description: >
    Kazda aplikacja korzystajaca z API musi autoryzowac sie appkey+secret
    w celu otrzymania tokena JWT. Brak autoryzacji=403, brak EP=404,
    zablokowane EP=401 key=3, limit=400 message=limit_exceeded.
  license:
    name: Wykop Sp. z o.o.
servers:
  - url: https://wykop.pl/api/v3/
    description: Wersja produkcyjna
security:
  - bearerAuth: []

paths:

  # ========== BEZPIECZENSTWO ==========

  /auth:
    post:
      summary: Autoryzacja aplikacji (generowanie tokenu JWT)
      security: []
      tags: [Bezpieczenstwo]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    key:
                      type: string
                    secret:
                      type: string
      responses:
        '200':
          description: Poprawna autoryzacja
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                    required: [token]
        '401':
          description: Nieprawidlowe dane
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicError'

  /refresh-token:
    post:
      summary: Logowanie przy uzyciu refresh_token
      security: []
      tags: [Bezpieczenstwo]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    refresh_token:
                      type: string
      responses:
        '200':
          description: Nowy JWT + refresh_token
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      refresh_token:
                        type: string
                      token:
                        type: string
                    required: [refresh_token, token]
        '401':
          description: Bledny refresh_token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicError'
        '423':
          description: IP na czarnej liscie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicError'

  /connect:
    get:
      summary: Inicjowanie logowania przez WykopConnect
      tags: [Bezpieczenstwo]
      responses:
        '200':
          description: URL do logowania
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      connect_url:
                        type: string
                    required: [connect_url]

  /logout:
    get:
      summary: Wylogowanie uzytkownika
      tags: [Bezpieczenstwo]
      responses:
        '204':
          description: Wylogowano

  # ========== UZYTKOWNICY ==========

  /users/autocomplete:
    get:
      summary: Podpowiada uzytkownikow po nickname
      tags: [Uzytkownicy]
      parameters:
        - name: query
          in: query
          schema:
            type: string
        - name: context
          in: query
          description: entry, link, link_comment, pm
          schema:
            type: string
        - name: target_id
          in: query
          schema:
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        username:
                          type: string
                        color:
                          $ref: '#/components/schemas/Color'
                        gender:
                          type: string
                          nullable: true
                        avatar:
                          type: string
                        followers_qty:
                          type: integer
        '400':
          description: Brak parametru query

  # ========== TAGI ==========

  /tags/autocomplete:
    get:
      summary: Podpowiada tagi
      tags: [Tagi]
      parameters:
        - name: query
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Max 10 wynikow
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        observed_qty:
                          type: integer
        '400':
          description: Brak/krotki query

  /tags/popular:
    get:
      summary: Lista popularnych tagow
      tags: [Tagi]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Tag'

  /tags/popular-user-tags:
    get:
      summary: Popularne tagi autorskie
      tags: [Tagi]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ShortTag'

  /tags/{tagName}/related:
    get:
      summary: Powiazane tagi
      tags: [Tagi]
      parameters:
        - $ref: '#/components/parameters/TagName'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ShortTag'

  /tags/{tagName}:
    get:
      summary: Szczegoly tagu
      tags: [Tagi]
      parameters:
        - $ref: '#/components/parameters/TagName'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Tag'
    put:
      summary: Edycja tagu (tlo + opis)
      tags: [Tagi]
      parameters:
        - $ref: '#/components/parameters/TagName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    photo:
                      type: string
                    description:
                      type: string
                      maxLength: 1000
      responses:
        '204':
          description: Sukces
        '400':
          description: Brak uprawnien
        '404':
          description: Tag nie istnieje
        '409':
          description: Blad walidacji

  /tags/{tagName}/stream:
    get:
      summary: Wpisy i znaleziska z tagu
      tags: [Tagi]
      parameters:
        - $ref: '#/components/parameters/TagName'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/TagsSort'
        - $ref: '#/components/parameters/TagsType'
        - $ref: '#/components/parameters/DateYear'
        - $ref: '#/components/parameters/DateMonth'
        - $ref: '#/components/parameters/Multimedia'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      anyOf:
                        - $ref: '#/components/schemas/Link'
                        - $ref: '#/components/schemas/Entry'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '404':
          description: Tag nie istnieje

  /tags/{tagName}/newer:
    get:
      summary: Czy sa nowe wpisy/linki w tagu
      tags: [Tagi]
      parameters:
        - $ref: '#/components/parameters/TagName'
        - $ref: '#/components/parameters/TagsType'
        - $ref: '#/components/parameters/TagsSort'
        - name: date
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/Multimedia'
        - name: id
          in: query
          schema:
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      count:
                        type: integer
        '404':
          description: Tag nie istnieje

  /tags/{tagName}/users:
    get:
      summary: Autorzy tagu autorskiego
      tags: [Tagi]
      parameters:
        - $ref: '#/components/parameters/TagName'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserShort'
        '404':
          description: Tag nie istnieje

  /tags/{tagName}/users/{username}:
    post:
      summary: Dodanie wspolautora tagu
      tags: [Tagi]
      parameters:
        - $ref: '#/components/parameters/TagName'
        - $ref: '#/components/parameters/Username'
      responses:
        '201':
          description: Dodano
        '400':
          description: Brak uprawnien
        '404':
          description: Tag nie istnieje
    delete:
      summary: Usuniecie wspolautora tagu
      tags: [Tagi]
      parameters:
        - $ref: '#/components/parameters/TagName'
        - $ref: '#/components/parameters/Username'
      responses:
        '204':
          description: Usunieto
        '400':
          description: Brak uprawnien
        '404':
          description: Tag nie istnieje

  /tags/{tagName}/pinned:
    get:
      summary: Zawartosc przypieta do tagu
      tags: [Tagi]
      parameters:
        - $ref: '#/components/parameters/TagName'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      anyOf:
                        - $ref: '#/components/schemas/Link'
                        - $ref: '#/components/schemas/Entry'
        '404':
          description: Tag nie istnieje

  /tags/{tagName}/pin/{resource}/{id}:
    post:
      summary: Przypiecie zawartosci do tagu
      tags: [Tagi]
      parameters:
        - $ref: '#/components/parameters/TagName'
        - name: resource
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      limit_reached:
                        type: boolean
        '400':
          description: Niepoprawne dane
        '409':
          description: Limit przypiec

  /tags/{tagName}/unpin/{resource}/{id}:
    delete:
      summary: Odpiecie zawartosci z tagu
      tags: [Tagi]
      parameters:
        - $ref: '#/components/parameters/TagName'
        - name: resource
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Odpieto
        '404':
          description: Tag nie istnieje

  /tags/{tagName}/notifications:
    get:
      summary: Stan powiadomien tagu autorskiego
      tags: [Tagi]
      parameters:
        - $ref: '#/components/parameters/TagName'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      notifications:
                        type: string
                        enum: [all, only_author]
        '400':
          description: Brak uprawnien
        '404':
          description: Tag nie istnieje
    put:
      summary: Edycja powiadomien tagu autorskiego
      tags: [Tagi]
      parameters:
        - $ref: '#/components/parameters/TagName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    notifications:
                      type: string
                      enum: [all, only_author]
      responses:
        '204':
          description: Zmieniono
        '400':
          description: Brak uprawnien

  /pinned-tags:
    get:
      summary: Lista przypietych tagow
      tags: [Przypiete tagi]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string

  # ========== POWIADOMIENIA ==========

  /notifications/status:
    get:
      summary: Status nowych powiadomien
      tags: [Powiadomienia]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      pm:
                        type: boolean
                      pm_notification:
                        type: boolean
                      entry_notification:
                        type: boolean
                      tag_notification:
                        type: boolean
                      observed_discussions_notification:
                        type: boolean
                      pm_notification_count:
                        type: integer
                      entry_notification_count:
                        type: integer
                      tag_notification_count:
                        type: integer
                      observed_discussions_notification_count:
                        type: integer

  /notifications/entries:
    get:
      summary: Lista powiadomien
      tags: [Powiadomienia]
      parameters:
        - $ref: '#/components/parameters/Page'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/NotificationEntry'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  /notifications/entries/all:
    put:
      summary: Oznacz wszystkie jako przeczytane
      tags: [Powiadomienia]
      responses:
        '204':
          description: Oznaczono
    delete:
      summary: Usun wszystkie
      tags: [Powiadomienia]
      responses:
        '204':
          description: Usunieto

  /notifications/entries/{id}:
    get:
      summary: Pobranie jednej notyfikacji (NotificationEntry)
      tags: [Powiadomienia]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/NotificationEntry'
        '404':
          description: Brak powiadomienia
    put:
      summary: Oznacz jako przeczytane
      tags: [Powiadomienia]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Oznaczono
        '404':
          description: Brak powiadomienia
    delete:
      summary: Usun powiadomienie
      tags: [Powiadomienia]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Usunieto
        '404':
          description: Brak powiadomienia

  /notifications/pm:
    get:
      summary: Lista powiadomien
      tags: [Powiadomienia]
      parameters:
        - $ref: '#/components/parameters/Page'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/NotificationPm'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  /notifications/pm/all:
    put:
      summary: Oznacz wszystkie jako przeczytane
      tags: [Powiadomienia]
      responses:
        '204':
          description: Oznaczono
    delete:
      summary: Usun wszystkie
      tags: [Powiadomienia]
      responses:
        '204':
          description: Usunieto

  /notifications/pm/{id}:
    get:
      summary: Pobranie jednej notyfikacji (NotificationPm)
      tags: [Powiadomienia]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/NotificationPm'
        '404':
          description: Brak powiadomienia
    put:
      summary: Oznacz jako przeczytane
      tags: [Powiadomienia]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Oznaczono
        '404':
          description: Brak powiadomienia
    delete:
      summary: Usun powiadomienie
      tags: [Powiadomienia]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Usunieto
        '404':
          description: Brak powiadomienia

  /notifications/tags:
    get:
      summary: Lista powiadomien
      tags: [Powiadomienia]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/ShowGrouped'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/NotificationTag'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  /notifications/tags/all:
    put:
      summary: Oznacz wszystkie jako przeczytane
      tags: [Powiadomienia]
      responses:
        '204':
          description: Oznaczono
    delete:
      summary: Usun wszystkie
      tags: [Powiadomienia]
      responses:
        '204':
          description: Usunieto

  /notifications/tags/{id}:
    get:
      summary: Pobranie jednej notyfikacji (NotificationTag)
      tags: [Powiadomienia]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/NotificationTag'
        '404':
          description: Brak powiadomienia
    put:
      summary: Oznacz jako przeczytane
      tags: [Powiadomienia]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Oznaczono
        '404':
          description: Brak powiadomienia
    delete:
      summary: Usun powiadomienie
      tags: [Powiadomienia]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Usunieto
        '404':
          description: Brak powiadomienia

  /notifications/observed-discussions:
    get:
      summary: Lista powiadomien
      tags: [Powiadomienia]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/ShowGrouped'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/NotificationObservedDiscussion'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  /notifications/observed-discussions/all:
    put:
      summary: Oznacz wszystkie jako przeczytane
      tags: [Powiadomienia]
      responses:
        '204':
          description: Oznaczono
    delete:
      summary: Usun wszystkie
      tags: [Powiadomienia]
      responses:
        '204':
          description: Usunieto

  /notifications/observed-discussions/{id}:
    get:
      summary: Pobranie jednej notyfikacji (NotificationObservedDiscussion)
      tags: [Powiadomienia]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/NotificationObservedDiscussion'
        '404':
          description: Brak powiadomienia
    put:
      summary: Oznacz jako przeczytane
      tags: [Powiadomienia]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Oznaczono
        '404':
          description: Brak powiadomienia
    delete:
      summary: Usun powiadomienie
      tags: [Powiadomienia]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Usunieto
        '404':
          description: Brak powiadomienia

  /notifications/groups/{group_id}:
    get:
      summary: Powiadomienia w grupie
      tags: [Powiadomienia]
      parameters:
        - name: group_id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      oneOf:
                        - $ref: '#/components/schemas/NotificationObservedDiscussion'
                        - $ref: '#/components/schemas/NotificationTag'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
    delete:
      summary: Usun powiadomienia z grupy
      tags: [Powiadomienia]
      parameters:
        - name: group_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Usunieto

  # ========== PROFILE ==========

  /profile:
    get:
      summary: Dane publiczne i prywatne zalogowanego uzytkownika
      tags: [Profile]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/UserFullPrivate'
        '404':
          description: Uzytkownik nie istnieje

  /profile/short:
    get:
      summary: Dane publiczne zalogowanego uzytkownika - skrocone
      tags: [Profile]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/UserShort'
        '404':
          description: Uzytkownik nie istnieje

  /profile/users-year-summaries/{year}/{token}:
    get:
      summary: Podsumowanie roku uzytkownika
      tags: [Profile]
      parameters:
        - name: year
          in: path
          required: true
          schema:
            type: integer
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/UserYearSummary'
        '404':
          description: Podsumowanie nie istnieje

  /profile/users/{username}:
    get:
      summary: Dane publiczne uzytkownika
      tags: [Profile]
      parameters:
        - $ref: '#/components/parameters/Username'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/UserFull'
        '404':
          description: Uzytkownik nie istnieje

  /profile/users/{username}/short:
    get:
      summary: Dane publiczne uzytkownika - skrocone
      tags: [Profile]
      parameters:
        - $ref: '#/components/parameters/Username'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/UserShort'
        '404':
          description: Uzytkownik nie istnieje

  /profile/users/{username}/actions:
    get:
      summary: Akcje uzytkownika (wpisy+znaleziska)
