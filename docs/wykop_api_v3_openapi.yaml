# ================================================================
# COMPONENTS
# ================================================================

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ========== PARAMETERS ==========

  parameters:
    Page:
      name: page
      in: query
      description: Numer strony
      schema:
        type: integer
        default: 1
    Limit:
      name: limit
      in: query
      description: Limit obiektow na stronie (1-50)
      schema:
        type: integer
        default: 25
        minimum: 1
        maximum: 50
    TagName:
      name: tagName
      in: path
      required: true
      description: Nazwa tagu
      schema:
        type: string
    Username:
      name: username
      in: path
      required: true
      description: Nazwa uzytkownika
      schema:
        type: string
    EntryId:
      name: entryId
      in: path
      required: true
      description: Identyfikator wpisu
      schema:
        type: integer
    Id:
      name: id
      in: path
      required: true
      description: Identyfikator
      schema:
        type: integer
    TagsSort:
      name: sort
      in: query
      description: Sortowanie tagow
      schema:
        type: string
        default: best
        enum: [all, best]
    TagsType:
      name: type
      in: query
      description: Typ tresci w tagu
      schema:
        type: string
        default: all
        enum: [all, author, link, entry]
    DateYear:
      name: year
      in: query
      schema:
        type: integer
    DateMonth:
      name: month
      in: query
      schema:
        type: integer
    Multimedia:
      name: multimedia
      in: query
      description: Tylko obiekty ze zdjeciami/embed
      schema:
        type: boolean
        default: false
    Sort:
      name: sort
      in: query
      description: Sortowanie znalezisk
      schema:
        type: string
        enum: [newest, active, commented, digged]
    Type:
      name: type
      in: query
      description: Typ tresci (homepage/upcoming)
      schema:
        type: string
        enum: [homepage, upcoming]
    Category:
      name: category
      in: query
      schema:
        type: string
    Bucket:
      name: bucket
      in: query
      description: Hash kategorii uzytkownika
      schema:
        type: string
    EntriesSort:
      name: sort
      in: query
      description: Sortowanie wpisow
      schema:
        type: string
        default: hot
        enum: [newest, active, hot]
    EntriesFilter:
      name: last_update
      in: query
      description: Wyniki z ostatnich X godzin (tylko z sort=hot)
      schema:
        type: integer
        default: 12
        enum: [1, 2, 3, 6, 12, 24]
    ShowGrouped:
      name: show_grouped
      in: query
      description: Zgrupuj powiadomienia
      schema:
        type: boolean
        default: false

  # ========== SCHEMAS ==========

  schemas:

    BasicError:
      type: object
      properties:
        code:
          type: integer
          description: Kod HTTP
        hash:
          type: string
          description: Wewnetrzny identyfikator bledu
        error:
          type: object
          properties:
            message:
              type: string
            key:
              type: integer
          required: [message]
      required: [code, error]

    Color:
      type: object
      properties:
        name:
          type: string
          example: burgundy
        hex:
          type: string
          example: dddddd
        hex_dark:
          type: string
          example: cccccc

    Pagination:
      type: object
      properties:
        per_page:
          type: integer
        total:
          type: integer
      required: [per_page, total]

    UserPagination:
      type: object
      properties:
        next:
          type: string
          description: Hash kolejnej strony
        prev:
          type: string
          description: Hash poprzedniej strony

    Photo:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
        mime_type:
          type: string
        url:
          type: string
        size:
          type: integer
        width:
          type: integer
        height:
          type: integer
      required: [key, label, mime_type, url, size, width, height]

    Embed:
      type: object
      properties:
        key:
          type: string
        type:
          type: string
          description: youtube, twitter, instagram, gfycat, streamable
        url:
          type: string
        thumbnail:
          type: string
        video_metadata:
          type: object
          properties:
            title:
              type: string
            description:
              type: string
            video_id:
              type: string
            published_at:
              type: string
            duration_in_seconds:
              type: integer
        age_category:
          type: string
          enum: [all, age_12, age_16, age_18]
        commercial:
          type: boolean
      required: [key, type, url, thumbnail]

    Survey:
      type: object
      properties:
        key:
          type: string
        question:
          type: string
        voted:
          type: integer
          description: 1=glosowal, 0=nie
        count:
          type: integer
        answers:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              answer:
                type: string
              count:
                type: integer
              percentage:
                type: number

    ShortTag:
      type: object
      properties:
        name:
          type: string
        pinned:
          type: boolean

    Tag:
      type: object
      properties:
        name:
          type: string
        author:
          $ref: '#/components/schemas/UserShort'
        personal:
          type: boolean
          description: Czy tag autorski
        media:
          type: object
          properties:
            photo:
              $ref: '#/components/schemas/Photo'
        description:
          type: string
        followers:
          type: integer
        follow:
          type: boolean
        notifications:
          type: boolean
        blacklist:
          type: boolean
        promoted:
          type: boolean
        editable:
          type: boolean
        created_at:
          type: string

    UserShort:
      type: object
      properties:
        username:
          type: string
        company:
          type: boolean
        gender:
          type: string
          description: m lub f
        avatar:
          type: string
        note:
          type: boolean
        online:
          type: boolean
        status:
          type: string
          description: active, banned, removed, inactive, suspended
        color:
          $ref: '#/components/schemas/Color'
        verified:
          type: boolean
        follow:
          type: boolean
        rank:
          type: object
          properties:
            position:
              type: integer
              nullable: true
            trend:
              type: integer
              description: 1=awansowal, 0=bez zmian, -1=spadl

    UserFull:
      allOf:
        - $ref: '#/components/schemas/UserShort'
        - type: object
          properties:
            name:
              type: string
            city:
              type: string
            website:
              type: string
            about:
              type: string
            public_email:
              type: string
            background:
              type: string
            followers:
              type: integer
            member_since:
              type: string
            summary:
              type: object
              properties:
                actions:
                  type: integer
                links:
                  type: integer
                links_details:
                  type: object
                  properties:
                    added:
                      type: integer
                    commented:
                      type: integer
                    published:
                      type: integer
                    related:
                      type: integer
                    up:
                      type: integer
                    down:
                      type: integer
                entries:
                  type: integer
                entries_details:
                  type: object
                  properties:
                    added:
                      type: integer
                    commented:
                      type: integer
                    voted:
                      type: integer
                following_users:
                  type: integer
                following_tags:
                  type: integer
                followers:
                  type: integer
            social_media:
              type: object
              properties:
                facebook:
                  type: string
                instagram:
                  type: string
                twitter:
                  type: string
            banned:
              type: object
              properties:
                reason:
                  type: string
                expired:
                  type: string
                  nullable: true

    UserFullPrivate:
      allOf:
        - $ref: '#/components/schemas/UserFull'
        - type: object
          properties:
            can_change_gender:
              type: boolean
            onboarding_step:
              type: string
              nullable: true
              description: profile, tags, lub null
            over18:
              type: boolean
            user_year_summaries:
              type: array
              items:
                type: object
                properties:
                  year:
                    type: integer
                  token:
                    type: string

    Entry:
      type: object
      properties:
        id:
          type: integer
        author:
          $ref: '#/components/schemas/UserShort'
        device:
          type: string
        created_at:
          type: string
        voted:
          type: integer
          description: 1=glosowal, 0=nie
        content:
          type: string
        media:
          type: object
          properties:
            photo:
              $ref: '#/components/schemas/Photo'
            embed:
              $ref: '#/components/schemas/Embed'
            survey:
              $ref: '#/components/schemas/Survey'
        adult:
          type: boolean
        tags:
          type: array
          items:
            type: string
        favourite:
          type: boolean
        deletable:
          type: boolean
        editable:
          type: boolean
        slug:
          type: string
        votes:
          type: object
          properties:
            up:
              type: integer
            down:
              type: integer
            users:
              type: array
              items:
                $ref: '#/components/schemas/UserShort'
        comments:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/EntryComment'
            count:
              type: integer
        resource:
          type: string
          example: entry
        archive:
          type: boolean
        deleted:
          type: boolean
        observed_discussion:
          type: boolean
        pinnable:
          type: boolean

    EntryComment:
      type: object
      properties:
        id:
